services:
  minio:
    image: minio/minio:latest
    container_name: arcana-bot-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"   # S3 API  — only reachable from this host
      - "127.0.0.1:9001:9001"   # MinIO console
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - arcana-net

  db:
    image: postgres:15-alpine
    container_name: arcana-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"   # localhost-only — for local psql / Alembic
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arcana-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arcana-bot-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "127.0.0.1:8000:8000"   # Nginx reverse proxy only
    networks:
      - arcana-net

networks:
  arcana-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
