name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            if [ ! -f .env ]; then
              echo "Error: .env file is missing on VPS!"
              exit 1
            fi
            git pull origin main
            make deploy
            docker image prune -f --filter "label=com.docker.compose.project=arcana-bot"